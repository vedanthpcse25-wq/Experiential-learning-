<div class="container my-5">

<h2 class="text-center text-primary mb-4">
    <u><i>Student Feedback Form</i></u>
</h2>
<form>
<div class="card mb-4">
    <div class="card-header bg-primary text-white">
        Student Details
    </div>


     <div class="card-body">

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Student ID</label>
            <input type="text" class="form-control" required>
        </div>

    </div>
</div>


       <div class="card">
    <div class="card-header bg-success text-white">
        Course Details
    </div>

    <div class="card-body">

        <h5 class="text-secondary mb-3">Academic Information</h5>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Semester</label>
                <select class="form-select" required>
                    <option value="">Options</option>
                    <option>Semester 1</option>
                    <option>Semester 2</option>
                    <option>Semester 3</option>
                    <option>Semester 4</option>
                    <option>Semester 5</option>
                    <option>Semester 6</option>
                    <option>Semester 7</option>
                    <option>Semester 8</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Year</label>
                <select class="form-select" required>
                    <option value="">Options</option>
                    <option>First Year</option>
                    <option>Second Year</option>
                    <option>Third Year</option>
                    <option>Final Year</option>
                </select>
            </div>
        </div>
          
                    <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Batch</label>
                <select class="form-select" required>
                    <option value="">Options</option>
                    <option>C1</option>
                    <option>C2</option>
                    <option>C3</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Section</label>
                <select class="form-select" required>
                    <option value="">Options</option>
                    <option>A</option>
                    <option>B</option>
                    <option>C</option>
                    <option>D</option>
                </select>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Department</label>
                <select class="form-select" required>
                    <option value="">Options</option>
                    <option>CSE</option>
                    <option>ECE</option>
                    <option>DS</option>
                    <option>ME</option>
                    <option>CE</option>
                    <option>IT</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Branch</label>
                <select class="form-select" required>
                    <option value="">Options</option>
                    <option>Computer Science Engineering</option>
                    <option>Electronics & Communication Engineering</option>
                    <option>Data Science</option>
                    <option>Mechanical Engineering</option>
                    <option>Civil Engineering</option>
                    <option>Information Technology</option>
                </select>
            </div>
        </div>
        
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Course</label>
                <select class="form-select" required>
                    <option value="">Options</option>
                    <option>WDL Lab</option>
                            <option>SMP Lab</option>
                            <option>EE Lab</option>
                            <option>LLC Lab</option>
                            <option>Maths</option>
                            <option>English</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Faculty</label>
                <select class="form-select" required>
                    <option value="">Options</option>
                  <option>Prof. Mayur Kadu</option>
                            <option>Prof. Abhijeet Thakur</option>
                            <option>Prof.Abhishek Dhonkse</option>
                            <option>Prof. Nikhil Chaudhari</option>
                            <option>Prof. Yogesh Panke</option>
                            <option>Prof. Shama Khan</option>
                </select>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Course Difficulty</label><br>
            <input type="radio" name="difficulty" required> Easy
            <input type="radio" name="difficulty"> Medium
            <input type="radio" name="difficulty"> Hard
        </div>
        <div class="mb-3">
    <label class="form-label">Rate the Course</label>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="rating" required>
        <label class="form-check-label">1 - Poor</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="rating">
        <label class="form-check-label">2 - Fair</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="rating">
        <label class="form-check-label">3 - Good</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="rating">
        <label class="form-check-label">4 - Very Good</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="rating">
        <label class="form-check-label">5 - Excellent</label>
    </div>
</div>
