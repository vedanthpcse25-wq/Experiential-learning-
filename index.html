<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Feedback Form</title>
</head>
<body>
<div class="container">
    <h2>Student Feedback Form</h2>

    <form action="#">
        <table align="center" border="1" cellpadding="10">
            <tr>
                <td><label for="name">First Name:</label></td>
                <td><input type="text" id="name" name="name" required></td>
            </tr>
            <tr>
                <td><label for="lname">Last Name:</label></td>
                <td><input type="text" id="lname" name="lname" required></td>
            </tr>

            <tr>
                <td><label for="email">Email Address:</label></td>
                <td><input type="email" id="email" name="email" required></td>
            </tr>

            <tr>
                <td><label>Course Difficulty:</label></td>
                <td>
                    <input type="radio" id="easy" name="difficulty" value="easy" required>
                    <label for="easy">Easy</label>
                    
                    <input type="radio" id="med" name="difficulty" value="medium">
                    <label for="med">Medium</label>

                     <input type="radio" id="hard" name="difficulty" value="hard">
                    <label for="hard">Hard</label>
                </td>
            </tr>
            <tr>
                <td><label>Rate the Course (1-5):</label></td>
                <td>
                    <input type="radio" name="rating" value="1" required> 1
                    <input type="radio" name="rating" value="2"> 2
                    <input type="radio" name="rating" value="3"> 3
                    <input type="radio" name="rating" value="4"> 4
                    <input type="radio" name="rating" value="5"> 5
                    <br><i>(1 = Poor, 5 = Excellent)</i>
                </td>
            </tr>
            </table>
            </form>
</body>
</html>
