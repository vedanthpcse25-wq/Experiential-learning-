<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Feedback Form</title>
</head>
<body>
<div class="container">
    <h2>Student Feedback Form</h2>

    <form action="#">
        <table align="center" border="1" cellpadding="20"></table>

            <tr>

            </tr>
            </table>
            </form>
</body>
</html>
