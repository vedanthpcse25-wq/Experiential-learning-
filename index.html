<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Experiential-learning</title>

<link rel="stylesheet" href="project.css">
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head><script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>


</head>
<body>

<div class="container">
    <h2 align="center"><u><i>Student Feedback Form</i></u></h2>

    <form action="#">
        <fieldset>
            <legend><b>Student Details</b></legend>

            <table align="center" border="1" cellpadding="15" width="650">
                <tr>
                    <td>Student First Name:</td>
                    <td><input type="text" name="name" required></td>
                </tr>
                <tr>
                    <td>Student Last Name:</td>
                    <td><input type="text" name="lname" required></td>
                </tr>

                <tr>
                    <td>Email Address:</td>
                    <td><input type="email" name="email" required></td>
                </tr>

                <tr>
                    <td>Student ID:</td>
                    <td><input type="text" name="roll" required></td>
                </tr>
            </table>
        </fieldset>

        <br>
        <fieldset>
            <legend><b>Course Details</b></legend>

            <table align="center" border="1" cellpadding="15" width="650">

                <tr>
                    <td>Date:</td>
                    <td><input type="date" name="date" required></td>
                </tr>

                <tr>
                    <td>Select Course:</td>
                    <td>
                        <select name="course" required>
                            <option value="">Select Course</option>
                            <option>WDL Lab</option>
                            <option>SMP Lab</option>
                            <option>EE Lab</option>
                            <option>LLC Lab</option>
                            <option>Maths</option>
                            <option>English</option>
                        </select>
                         <select name="faculty">
                            <option value="">Select Faculty</option>
                            <option>Prof. Mayur Kadu</option>
                            <option>Prof. Abhijeet Thakur</option>
                            <option>Prof.Abhishek Dhonkse</option>
                            <option>Prof. Nikhil Chaudhari</option>
                            <option>Prof. Yogesh Panke</option>
                            <option>Prof. Shama Khan</option>
                            </select>
          
                    </td>
                </tr>

                <tr>
                             <td>Course Difficulty:</td>
                    <td>
                        <input type="radio" name="difficulty" value="easy" required> Easy
                        <input type="radio" name="difficulty" value="medium"> Medium
                        <input type="radio" name="difficulty" value="hard"> Hard
                    </td>
                </tr>
                <tr>
                    <td>Rate the Course:</td>
                    <td>
                        <input type="radio" name="rating" value="1" required> 1 - Poor <br>
                        <input type="radio" name="rating" value="2"> 2 - Fair <br>
                        <input type="radio" name="rating" value="3"> 3 - Good <br>
                        <input type="radio" name="rating" value="4"> 4 - Very Good <br>
                        <input type="radio" name="rating" value="5"> 5 - Excellent
                    </td>
                </tr>

                <tr>
                    <td>Comments:</td>
                    <td>
                        <textarea name="comments" rows="5" cols="30" required></textarea>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Submit Feedback">
                        <input type="reset" value="Reset Form">
                    </td>
                </tr>

            </table>
        </fieldset>

    </form>
</div>

</body>
</html>
